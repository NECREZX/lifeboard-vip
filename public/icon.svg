<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Premium Indigo to Cyan/Teal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81;stop-opacity:1" /> <!-- Deep Indigo -->
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" /> <!-- Vibrant Violet/Indigo -->
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" /> <!-- Cyan -->
    </linearGradient>

    <!-- Metallic Gold Gradient for Highlights -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef08a;stop-opacity:1" />
    </linearGradient>

    <!-- Glassmorphic Card Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>

    <!-- Dropshadow filter for depth -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.3" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. Solid Outer Rounded Square Background -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" />

  <!-- Decorative Glowing Ring representing Unity and Wholeness of Life -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="12" />
  <circle cx="256" cy="256" r="165" fill="none" stroke="white" stroke-opacity="0.04" stroke-width="6" />

  <!-- 2. Interactive "Lifeboard" Bento Dashboard Mockup inside the icon -->
  <g filter="url(#premiumShadow)">
    <!-- Main Glassmorphic Central Board Panel -->
    <rect x="106" y="106" width="300" height="300" rx="40" fill="url(#glassGrad)" stroke="white" stroke-opacity="0.2" stroke-width="3" backdrop-filter="blur(10px)" />

    <!-- Left Vertical Panel: Calendar/Timeline Strip (Activity/Planning) -->
    <rect x="131" y="131" width="65" height="110" rx="16" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.15" stroke-width="1.5" />
    <!-- Mini checkbox checks representing completed habits -->
    <rect x="146" y="151" width="16" height="16" rx="5" fill="#10b981" />
    <path d="M150 159 L153 162 L158 155" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    
    <rect x="146" y="177" width="16" height="16" rx="5" fill="#10b981" />
    <path d="M150 185 L153 188 L158 181" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    
    <rect x="146" y="203" width="16" height="16" rx="5" fill="white" fill-opacity="0.2" />

    <!-- Bottom Left Panel: Wishlist & Capital Goal Target -->
    <rect x="131" y="256" width="65" height="125" rx="16" fill="url(#goldGrad)" />
    <!-- Crown icon or gold target star -->
    <path d="M163.5 296 L171 311 L187.5 312.5 L175 323.5 L178.5 340 L163.5 331.5 L148.5 340 L152 323.5 L139.5 312.5 L156 311 Z" fill="white" />

    <!-- Right Large Panel: Main Financial / Upward growth chart (Wealth) -->
    <rect x="211" y="131" width="170" height="250" rx="20" fill="white" />
    
    <!-- Stylized rising line chart representing exponential progress -->
    <path d="M236 331 L271 296 L306 311 L356 226" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="236" cy="331" r="5" fill="#4f46e5" />
    <circle cx="271" cy="296" r="5" fill="#4f46e5" />
    <circle cx="306" cy="311" r="5" fill="#4f46e5" />
    <circle cx="356" cy="226" r="7" fill="#10b981" filter="url(#glow)" />
  </g>

  <!-- High-quality subtle highlight flares -->
  <circle cx="106" cy="106" r="12" fill="white" fill-opacity="0.4" filter="url(#glow)" />
  <circle cx="406" cy="406" r="8" fill="#38bdf8" fill-opacity="0.6" filter="url(#glow)" />
</svg>
